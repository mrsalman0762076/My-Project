<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .card{
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            width:300px;
        }

        .emoji{
            font-size:50px;
        }

        h1{
            margin:10px 0;
            color:#333;
        }

        p{
            color:#555;
            font-size:14px;
            line-height:1.5;
        }

        .btn{
            display:inline-block;
            margin-top:15px;
            padding:10px 20px;
            background:#764ba2;
            color:white;
            text-decoration:none;
            border-radius:20px;
        }

        .btn:hover{
            background:#5b3b8a;
        }
    </style>

</head>
<body>

    <div class="card">
        <div class="emoji">👋</div>
        <h1>Welcome!</h1>
        <p>
            Hello and welcome to my website.<br>
            We're glad you're here. Have a wonderful day!
        </p>
        <a href="#" class="btn">Get Started</a>
    </div>

</body>
</html>

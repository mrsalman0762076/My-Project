<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #4f46e5, #7c3aed, #ec4899);
            overflow:hidden;
        }

        .card{
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
        }

        h1{
            font-size: 3rem;
            margin-bottom: 15px;
        }

        p{
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn{
            display:inline-block;
            padding:12px 28px;
            background:white;
            color:#6d28d9;
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            transform: translateY(-3px);
            background:#f3f4f6;
        }

        .emoji{
            font-size:4rem;
            margin-bottom:15px;
            animation: wave 2s infinite;
        }

        @keyframes wave {
            0%,100%{transform:rotate(0deg);}
            25%{transform:rotate(10deg);}
            75%{transform:rotate(-10deg);}
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="emoji">👋</div>
        <h1>Welcome!</h1>
        <p>
            Hello and welcome to my website.<br>
            We're glad you're here. Have a wonderful day!
        </p>
        <a href="#" class="btn">Get Started</a>
    </div>

</body>
</html>
